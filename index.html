<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanzz Concursos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header-principal">
        <div class="header-container">
            <div class="logo-area">
                <div class="menu-mobile-btn" onclick="toggleMenu()">
                    <i class="fas fa-bars"></i>
                </div>
                <a href="#" class="logo">VANZZ <span class="gold-text">CONCURSOS</span></a>
            </div>
            
            <div class="busca-area">
                <input type="text" placeholder="Buscar simulados, matérias ou concursos...">
                <button><i class="fas fa-search"></i></button>
            </div>

            <div class="perfil-area">
                <a href="https://wa.me/5582996793347" target="_blank" class="btn-suporte">
                    <i class="fab fa-whatsapp"></i> Suporte
                </a>
                <div class="avatar-usuario">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-categorias" id="nav-categorias">
        <div class="nav-container">
            <ul>
                <li><a href="#" class="ativo"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="#"><i class="fas fa-file-alt"></i> Simulados</a></li>
                <li><a href="#"><i class="fas fa-book-open"></i> Matérias</a></li>
                <li><a href="#"><i class="fas fa-chart-line"></i> Desempenho</a></li>
            </ul>
        </div>
    </nav>

    <main class="container-principal">
        <div id="conteudo-dinamico">
            <div class="mensagem-boas-vindas">
                <h2>Área de Trabalho Pronta</h2>
                <p>O layout base está configurado. Aguardando a inserção dos módulos de simulados e questões.</p>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
