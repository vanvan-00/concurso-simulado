<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<div id="conteudo-programa" class="text-center p-8">
  <div class="text-6xl mb-4">🚧</div>
  <div style="font-family:'Bebas Neue'; font-size:2rem; color: var(--neon-lime);">Em breve, 1000 questões!</div>
  <p class="mt-4 opacity-70">Estamos preparando este simulado. Em breve você poderá treinar com milhares de questões.</p>
  <button class="btn-voltar mt-4" onclick="voltar()">← Voltar</button>
</div>
<script>
  function voltar() {
    if (window.parent && window.parent.btnVoltar) {
      window.parent.btnVoltar.click();
    } else {
      window.history.back();
    }
  }
</script>
</body>
</html>
